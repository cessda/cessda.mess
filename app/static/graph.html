<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MESS — Knowledge Graph</title>
  <style>
    :root {
      --blue: #1a56a0;
      --gray: #6b7280;
      --border: #d1d5db;
      --radius: 6px;
      --text: #111827;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f9fafb; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    header {
      background: var(--blue);
      color: #fff;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    header h1 { font-size: 1rem; font-weight: 700; }
    nav { display: flex; gap: 12px; margin-left: auto; }
    nav a { color: rgba(255,255,255,0.85); text-decoration: none; font-size: 0.85rem; padding: 4px 10px; border-radius: 4px; }
    nav a:hover, nav a.active { background: rgba(255,255,255,0.2); color: #fff; }

    .toolbar {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .view-btn {
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: #fff;
      font-size: 0.82rem;
      cursor: pointer;
      color: var(--text);
    }
    .view-btn:hover { background: #eff6ff; border-color: var(--blue); color: var(--blue); }
    .view-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }

    .legend { display: flex; gap: 14px; margin-left: 12px; font-size: 0.78rem; color: var(--gray); align-items: center; }
    .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 4px; }

    .spinner-overlay {
      position: absolute;
      inset: 0;
      background: rgba(249,250,251,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.95rem;
      color: var(--gray);
      z-index: 10;
    }
    .error-bar {
      display: none;
      background: #fee2e2;
      border-bottom: 1px solid #fca5a5;
      padding: 10px 16px;
      font-size: 0.85rem;
      color: #b91c1c;
      flex-shrink: 0;
    }
    .error-bar.show { display: block; }

    .graph-area { flex: 1; position: relative; overflow: hidden; }
    #network { width: 100%; height: 100%; }

    .info-panel {
      position: absolute;
      right: 16px;
      top: 16px;
      width: 270px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      font-size: 0.83rem;
      display: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      z-index: 5;
      max-height: calc(100% - 32px);
      overflow-y: auto;
    }
    .info-panel.show { display: block; }
    .info-panel h3 { font-size: 0.9rem; margin-bottom: 8px; color: var(--blue); }
    .info-label { font-size: 0.72rem; font-weight: 700; color: var(--gray); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 8px; margin-bottom: 2px; }
    .info-value { color: var(--text); }
    .info-close { float: right; background: none; border: none; cursor: pointer; color: var(--gray); font-size: 1rem; line-height: 1; }
  </style>
</head>
<body>

<header>
  <h1>MESS — Knowledge Graph Explorer</h1>
  <nav>
    <a href="browse.html">Browse</a>
    <a href="index.html">Enrich</a>
    <a href="sparql.html">SPARQL</a>
    <a href="graph.html" class="active">Graph</a>
  </nav>
</header>

<div class="toolbar">
  <button class="view-btn active" onclick="loadView('all')">All connections</button>
  <button class="view-btn" onclick="loadView('datasets')">Datasets only</button>
  <button class="view-btn" onclick="loadView('cited')">Most cited (&ge;1 citation)</button>
  <button class="view-btn" onclick="loadView('creators')">Creators network</button>

  <div class="legend">
    <span><span class="dot" style="background:#3b82f6"></span>Dataset</span>
    <span><span class="dot" style="background:#f59e0b"></span>Publication</span>
    <span><span class="dot" style="background:#10b981"></span>Software</span>
    <span><span class="dot" style="background:#8b5cf6"></span>Other</span>
    <span><span class="dot" style="background:#6b7280"></span>Creator</span>
  </div>
</div>

<div class="error-bar" id="err"></div>

<div class="graph-area">
  <div class="spinner-overlay" id="spinner">Loading graph&hellip;</div>
  <div id="network"></div>

  <div class="info-panel" id="info">
    <button class="info-close" onclick="document.getElementById('info').classList.remove('show')">✕</button>
    <h3 id="info-title">Node</h3>
    <div id="info-body"></div>
  </div>
</div>

<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<script>
const COLORS = {
  dataset:     { background: '#dbeafe', border: '#3b82f6', highlight: { background: '#93c5fd', border: '#1d4ed8' } },
  publication: { background: '#fef3c7', border: '#f59e0b', highlight: { background: '#fcd34d', border: '#d97706' } },
  software:    { background: '#d1fae5', border: '#10b981', highlight: { background: '#6ee7b7', border: '#059669' } },
  other:       { background: '#ede9fe', border: '#8b5cf6', highlight: { background: '#c4b5fd', border: '#7c3aed' } },
  creator:     { background: '#f3f4f6', border: '#6b7280', highlight: { background: '#d1d5db', border: '#374151' } },
};
const REL_LABELS = {
  'https://w3id.org/skg-if/ontology/cites':          'cites',
  'https://w3id.org/skg-if/ontology/isRelatedTo':    'related',
  'https://w3id.org/skg-if/ontology/isSupplementTo': 'supplement',
  'https://w3id.org/skg-if/ontology/references':     'references',
  'https://w3id.org/skg-if/ontology/hasPart':        'has part',
  'https://w3id.org/skg-if/ontology/isPartOf':       'part of',
  'https://w3id.org/skg-if/ontology/isDerivedFrom':  'derived from',
  'https://w3id.org/skg-if/ontology/isSourceOf':     'source of',
  'https://w3id.org/skg-if/ontology/isNewVersionOf': 'new version',
  'http://purl.org/dc/terms/creator':                'creator',
};

const QUERIES = {
  all: `
PREFIX skg: <https://w3id.org/skg-if/ontology/>
PREFIX dcterms: <http://purl.org/dc/terms/>
SELECT ?source ?sourceTitle ?sourceType ?predicate ?target ?targetTitle ?targetType WHERE {
  VALUES ?predicate {
    skg:cites skg:isRelatedTo skg:isSupplementTo skg:references
    skg:hasPart skg:isPartOf skg:isDerivedFrom skg:isSourceOf skg:isNewVersionOf
  }
  ?source ?predicate ?target ;
          dcterms:title ?sourceTitle ;
          a ?sourceType .
  ?target dcterms:title ?targetTitle ;
          a ?targetType .
  VALUES ?sourceType { skg:Dataset skg:Publication skg:Software skg:ResearchProduct }
  VALUES ?targetType { skg:Dataset skg:Publication skg:Software skg:ResearchProduct }
} LIMIT 300`,

  datasets: `
PREFIX skg: <https://w3id.org/skg-if/ontology/>
PREFIX dcterms: <http://purl.org/dc/terms/>
SELECT ?source ?sourceTitle ?predicate ?target ?targetTitle WHERE {
  VALUES ?predicate {
    skg:cites skg:isRelatedTo skg:isSupplementTo skg:references
    skg:hasPart skg:isPartOf skg:isDerivedFrom skg:isSourceOf skg:isNewVersionOf
  }
  ?source a skg:Dataset ;
          dcterms:title ?sourceTitle ;
          ?predicate ?target .
  ?target dcterms:title ?targetTitle .
} LIMIT 200`,

  cited: `
PREFIX skg: <https://w3id.org/skg-if/ontology/>
PREFIX dcterms: <http://purl.org/dc/terms/>
SELECT ?source ?sourceTitle ?sourceType ?predicate ?target ?targetTitle ?targetType WHERE {
  VALUES ?predicate {
    skg:cites skg:isRelatedTo skg:isSupplementTo skg:references
    skg:hasPart skg:isPartOf skg:isDerivedFrom skg:isSourceOf skg:isNewVersionOf
  }
  ?source ?predicate ?target ;
          dcterms:title ?sourceTitle ;
          a ?sourceType ;
          skg:citationCount ?cnt .
  FILTER(?cnt >= 1)
  ?target dcterms:title ?targetTitle ;
          a ?targetType .
  VALUES ?sourceType { skg:Dataset skg:Publication skg:Software skg:ResearchProduct }
  VALUES ?targetType { skg:Dataset skg:Publication skg:Software skg:ResearchProduct }
} LIMIT 200`,

  creators: `
PREFIX skg: <https://w3id.org/skg-if/ontology/>
PREFIX dcterms: <http://purl.org/dc/terms/>
PREFIX schema: <https://schema.org/>
SELECT ?source ?sourceTitle ?target ?name WHERE {
  ?source dcterms:title ?sourceTitle ;
          dcterms:creator ?target .
  ?target schema:name ?name .
} LIMIT 200`,
};

let network = null;
let currentView = 'all';
let nodeData = {};  // id → {title, type, citations}

function nodeLabel(title) {
  if (!title) return '';
  return title.length > 35 ? title.slice(0, 33) + '…' : title;
}

function typeFromUri(uri) {
  if (!uri) return 'other';
  if (uri.includes('/Dataset')) return 'dataset';
  if (uri.includes('/Publication')) return 'publication';
  if (uri.includes('/Software')) return 'software';
  return 'other';
}

async function sparql(query) {
  const resp = await fetch('/sparql', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/x-www-form-urlencoded',
      'Accept': 'application/sparql-results+json',
    },
    body: 'query=' + encodeURIComponent(query),
  });
  if (!resp.ok) {
    const txt = await resp.text();
    throw new Error(txt);
  }
  return resp.json();
}

async function loadView(view) {
  currentView = view;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  await renderGraph(view);
}

async function renderGraph(view) {
  const spinner = document.getElementById('spinner');
  const errBar  = document.getElementById('err');
  const infoPanel = document.getElementById('info');

  spinner.style.display = 'flex';
  errBar.classList.remove('show');
  infoPanel.classList.remove('show');
  nodeData = {};

  try {
    const data = await sparql(QUERIES[view]);
    const bindings = data?.results?.bindings || [];

    const nodes = new Map();
    const edges = [];
    const edgeSeen = new Set();

    if (view === 'creators') {
      for (const b of bindings) {
        const srcId = b.source?.value;
        const tgtId = b.target?.value;
        const srcTitle = b.sourceTitle?.value || srcId;
        const name = b.name?.value || tgtId;
        if (!srcId || !tgtId) continue;

        if (!nodes.has(srcId)) {
          nodes.set(srcId, {
            id: srcId, label: nodeLabel(srcTitle), title: srcTitle, group: 'dataset',
            color: COLORS.dataset, shape: 'box', font: { size: 11 },
          });
          nodeData[srcId] = { title: srcTitle, type: 'dataset' };
        }
        if (!nodes.has(tgtId)) {
          nodes.set(tgtId, {
            id: tgtId, label: nodeLabel(name), title: name, group: 'creator',
            color: COLORS.creator, shape: 'ellipse', font: { size: 10 },
          });
          nodeData[tgtId] = { title: name, type: 'creator' };
        }
        const eKey = `${srcId}__creator__${tgtId}`;
        if (!edgeSeen.has(eKey)) {
          edgeSeen.add(eKey);
          edges.push({ from: srcId, to: tgtId, label: 'creator', arrows: 'to',
                       color: { color: '#9ca3af', opacity: 0.7 }, font: { size: 9, color: '#9ca3af' } });
        }
      }
    } else {
      for (const b of bindings) {
        const srcId   = b.source?.value;
        const tgtId   = b.target?.value;
        const srcTitle = b.sourceTitle?.value || srcId;
        const tgtTitle = b.targetTitle?.value || tgtId;
        const pred    = b.predicate?.value || '';
        const srcType = typeFromUri(b.sourceType?.value);
        const tgtType = typeFromUri(b.targetType?.value);
        if (!srcId || !tgtId) continue;

        if (!nodes.has(srcId)) {
          nodes.set(srcId, {
            id: srcId, label: nodeLabel(srcTitle), title: srcTitle,
            group: srcType, color: COLORS[srcType] || COLORS.other,
            shape: 'box', font: { size: 11 },
          });
          nodeData[srcId] = { title: srcTitle, type: srcType };
        }
        if (!nodes.has(tgtId)) {
          nodes.set(tgtId, {
            id: tgtId, label: nodeLabel(tgtTitle), title: tgtTitle,
            group: tgtType, color: COLORS[tgtType] || COLORS.other,
            shape: 'box', font: { size: 11 },
          });
          nodeData[tgtId] = { title: tgtTitle, type: tgtType };
        }
        const eKey = `${srcId}__${pred}__${tgtId}`;
        if (!edgeSeen.has(eKey)) {
          edgeSeen.add(eKey);
          const edgeLabel = REL_LABELS[pred] || pred.split('/').pop();
          edges.push({
            from: srcId, to: tgtId, label: edgeLabel, arrows: 'to',
            color: { opacity: 0.6 }, font: { size: 9, color: '#4b5563' },
          });
        }
      }
    }

    if (nodes.size === 0) {
      errBar.textContent = 'No data returned — have you run enrichment and rebuilt the QLever index?';
      errBar.classList.add('show');
      spinner.style.display = 'none';
      return;
    }

    const container = document.getElementById('network');
    const options = {
      layout: { improvedLayout: nodes.size < 100 },
      physics: {
        enabled: true,
        stabilization: { iterations: 200 },
        barnesHut: { gravitationalConstant: -8000, springLength: 140, damping: 0.12 },
      },
      interaction: { hover: true, tooltipDelay: 200, navigationButtons: true, keyboard: true },
      nodes: { borderWidth: 1.5, borderWidthSelected: 2.5, shadow: false },
      edges: { smooth: { type: 'continuous', roundness: 0.2 }, width: 1.2 },
    };

    if (network) {
      network.destroy();
      network = null;
    }

    network = new vis.Network(container,
      { nodes: new vis.DataSet([...nodes.values()]), edges: new vis.DataSet(edges) },
      options
    );

    network.on('stabilizationIterationsDone', () => {
      spinner.style.display = 'none';
      network.setOptions({ physics: { enabled: false } });
    });

    network.on('click', params => {
      if (params.nodes.length === 1) showInfo(params.nodes[0]);
      else document.getElementById('info').classList.remove('show');
    });

    network.on('doubleClick', params => {
      if (params.nodes.length === 1) {
        const id = params.nodes[0];
        if (id.startsWith('https://doi.org/')) window.open(id, '_blank');
      }
    });

  } catch (e) {
    spinner.style.display = 'none';
    errBar.textContent = 'Error: ' + (e.message || e);
    errBar.classList.add('show');
  }
}

function showInfo(nodeId) {
  const meta = nodeData[nodeId] || {};
  const panel = document.getElementById('info');
  const body  = document.getElementById('info-body');
  document.getElementById('info-title').textContent = meta.title || nodeId;

  let html = '';
  if (meta.type) {
    html += `<div class="info-label">Type</div><div class="info-value">${meta.type}</div>`;
  }
  html += `<div class="info-label">URI</div><div class="info-value" style="word-break:break-all;font-size:0.78rem">${nodeId}</div>`;
  if (nodeId.startsWith('https://doi.org/')) {
    html += `<div style="margin-top:10px"><a href="${nodeId}" target="_blank" style="color:#1a56a0;font-size:0.82rem">Open DOI ↗</a></div>`;
  }
  html += `<div style="margin-top:10px"><a href="index.html?pid=${encodeURIComponent(nodeId.replace('https://doi.org/',''))}" style="color:#1a56a0;font-size:0.82rem">Enrich this object ↗</a></div>`;

  body.innerHTML = html;
  panel.classList.add('show');
}

// Auto-load on page open
window.addEventListener('load', () => renderGraph('all'));
</script>
</body>
</html>
