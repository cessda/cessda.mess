# QLever SPARQL server — run separately after exporting triples and building the index.
#
# Workflow:
#   Step 1: Export triples from PostgreSQL:
#     docker compose run --rm mess-api python scripts/export_triples.py
#
#   Step 2: Build the QLever index (one-time per data refresh):
#     docker compose -f docker-compose.qlever.yml run --rm indexer
#
#   Step 3: Start the QLever SPARQL server:
#     docker compose -f docker-compose.qlever.yml up -d qlever
#
#   To refresh: stop qlever, re-run steps 1-3.
#   Shortcut: bash scripts/rebuild_qlever.sh

name: mess-qlever

networks:
  mess-net:
    external: true
    name: mess-net

services:

  indexer:
    image: adfreiburg/qlever:commit-36ed965
    networks: [mess-net]
    entrypoint: /qlever/qlever-index
    volumes:
      - export:/export
      - qlever-index:/index
    working_dir: /index
    # -f: input NT file  -i: index basename (all index files share this prefix)
    command: ["-f", "/export/graph.nt", "-i", "/index/graph"]

  qlever:
    image: adfreiburg/qlever:commit-36ed965
    networks: [mess-net]
    entrypoint: /qlever/qlever-server
    restart: unless-stopped
    volumes:
      - qlever-index:/index
    ports:
      - "7001:7001"
    # -i: index basename  -p: HTTP port
    command: ["-i", "/index/graph", "-p", "7001"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- 'http://localhost:7001/ping' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  export:
    external: true
    name: mess_export
  qlever-index:
    name: mess_qlever_index
